name: Deploy static demo to GitHub Pages

# Builds the client in "demo mode" (see client/package.json's build:demo
# script, and client/src/demo/demoApi.js) - the real React app UI, wired to
# an in-memory copy of the seeded dataset instead of the live Express
# server, since GitHub Pages can only serve static files. Runs on every push
# to main that touches the client, and can also be triggered manually.
on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Seed the demo dataset
        working-directory: server
        run: npm run seed

      - name: Export seeded data for the client bundle
        working-directory: server
        run: node scripts/export-demo-data.js

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build static demo
        working-directory: client
        run: npm run build:demo

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
